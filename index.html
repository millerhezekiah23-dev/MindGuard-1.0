<!DOCTYPE html>
<html>
<head>
  <title>MindGuard</title>
</head>
<body>

  <h1>MindGuard Daily Check-In</h1>

  <!-- AUTH -->
  <h2>Login / Sign Up</h2>
  <input id="email" placeholder="Email" />
  <input id="password" type="password" placeholder="Password" />
  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>

  <hr />

  <!-- CHECK-IN -->
  <h2>Daily Check-In</h2>
  <input id="emotion" placeholder="Emotion" />
  <input id="intensity" type="number" placeholder="Intensity (1-10)" />
  <textarea id="notes" placeholder="Notes"></textarea>
  <input id="sleep" type="number" placeholder="Hours of sleep" />
  <input id="gratitude" placeholder="What are you grateful for?" />
  <button onclick="saveCheckin()">Save Check-In</button>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
      'YOUR_PROJECT_URL',
      'YOUR_ANON_KEY'
    )

    async function signUp() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { error } = await supabase.auth.signUp({ email, password })
      alert(error ? error.message : "Signed up!")
    }

    async function login() {
      const email = document.getElementById('email').value
      const password = document.getElementById('password').value

      const { error } = await supabase.auth.signInWithPassword({ email, password })
      alert(error ? error.message : "Logged in!")
    }

    async function saveCheckin() {
      const { data: { user } } = await supabase.auth.getUser()

      if (!user) {
        alert("You must be logged in!")
        return
      }

      const emotion = document.getElementById('emotion').value
      const intensity = document.getElementById('intensity').value
      const notes = document.getElementById('notes').value
      const sleep = document.getElementById('sleep').value
      const gratitude = document.getElementById('gratitude').value

      const { error } = await supabase
        .from('checkins')
        .insert([{
          user_id: user.id,
          emotion,
          intensity,
          notes,
          sleep_hours: sleep,
          gratitude
        }])

      alert(error ? error.message : "Check-in saved!")
    }
  </script>

</body>
</html>
