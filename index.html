<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindGuard</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: #f8fafc;
      min-height: 100vh;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 24px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 42px;
    }

    .hero p {
      margin: 0;
      color: #cbd5e1;
      font-size: 18px;
    }

    .card {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(8px);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .full {
      grid-column: 1 / -1;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #f8fafc;
      font-size: 16px;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .primary {
      background: #22c55e;
      color: #052e16;
    }

    .secondary {
      background: #38bdf8;
      color: #082f49;
    }

    .danger {
      background: #f87171;
      color: #450a0a;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
    }

    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: #e2e8f0;
      min-height: 20px;
    }

    .history-item {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 12px 0;
    }

    .history-item:first-child {
      border-top: none;
    }

    .small {
      font-size: 13px;
      color: #94a3b8;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <h1>MindGuard</h1>
      <p>Daily emotional check-ins, reflections, and healthier self-awareness.</p>
    </div>

    <div class="card">
      <h2>Account</h2>
      <div class="grid">
        <input id="email" type="email" placeholder="Email" />
        <input id="password" type="password" placeholder="Password" />
      </div>
      <div class="button-row">
        <button class="primary" id="signupBtn">Sign Up</button>
        <button class="secondary" id="loginBtn">Log In</button>
        <button class="danger" id="logoutBtn">Log Out</button>
      </div>
      <div class="status" id="authStatus">Not logged in</div>
      <p class="muted">If sign up works but login does not, your Supabase email confirmation setting may be enabled.</p>
    </div>

    <div class="card">
      <h2>Daily Check-In</h2>
      <div class="grid">
        <input id="emotion" placeholder="Emotion (example: sad, anxious, calm)" />
        <input id="intensity" type="number" min="1" max="10" placeholder="Intensity 1-10" />
        <input id="sleep" type="number" min="0" max="24" step="0.5" placeholder="Hours of sleep" />
        <input id="gratitude" placeholder="What are you grateful for?" />
        <textarea id="notes" class="full" placeholder="Write what is going on today..."></textarea>
      </div>
      <div class="button-row">
        <button class="primary" id="saveCheckinBtn">Save Check-In</button>
        <button class="secondary" id="loadCheckinsBtn">Load My Check-Ins</button>
      </div>
      <div class="status" id="checkinStatus">Ready</div>
    </div>

    <div class="card">
      <h2>Your Recent Check-Ins</h2>
      <div id="history">No check-ins loaded yet.</div>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabase = createClient(
  'https://qtxuyfhdjqqretwmocl.supabase.co',
  'sb_publishable_H44ZfOLe0oNR0OTehw6Yqg_gWBb4tDo'
)

    const authStatus = document.getElementById('authStatus')
    const checkinStatus = document.getElementById('checkinStatus')
    const history = document.getElementById('history')

    function setAuthStatus(message) {
      authStatus.textContent = message
    }

    function setCheckinStatus(message) {
      checkinStatus.textContent = message
    }

    async function ensureProfile(user) {
      if (!user) return

      const { data: existing, error: selectError } = await supabase
        .from('Profiles')
        .select('id')
        .eq('id', user.id)
        .maybeSingle()

      if (selectError) {
        console.error('Profile lookup error:', selectError)
        return
      }

      if (!existing) {
        const { error: insertError } = await supabase
          .from('Profiles')
          .insert([
            {
              id: user.id,
              email: user.email
            }
          ])

        if (insertError) {
          console.error('Profile insert error:', insertError)
        }
      }
    }

    async function signUp() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value.trim()

      if (!email || !password) {
        setAuthStatus('Enter email and password first.')
        return
      }

      setAuthStatus('Signing up...')

      const { data, error } = await supabase.auth.signUp({ email, password })

      if (error) {
        setAuthStatus(`Sign up failed: ${error.message}`)
        return
      }

      if (data.user) {
        await ensureProfile(data.user)
      }

      if (data.session) {
        setAuthStatus(`Signed up and logged in as ${email}`)
      } else {
        setAuthStatus('Sign up worked. Check your email if confirmation is required.')
      }
    }

    async function login() {
      const email = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value.trim()

      if (!email || !password) {
        setAuthStatus('Enter email and password first.')
        return
      }

      setAuthStatus('Logging in...')

      const { data, error } = await supabase.auth.signInWithPassword({ email, password })

      if (error) {
        setAuthStatus(`Login failed: ${error.message}`)
        return
      }

      if (data.user) {
        await ensureProfile(data.user)
      }

      setAuthStatus(`Logged in as ${email}`)
      await loadCheckins()
    }

    async function logout() {
      const { error } = await supabase.auth.signOut()

      if (error) {
        setAuthStatus(`Logout failed: ${error.message}`)
        return
      }

      setAuthStatus('Logged out')
      history.innerHTML = 'No check-ins loaded yet.'
    }

    async function saveCheckin() {
      const { data: authData, error: authError } = await supabase.auth.getUser()

      if (authError || !authData.user) {
        setCheckinStatus('You must be logged in before saving a check-in.')
        return
      }

      const emotion = document.getElementById('emotion').value.trim()
      const intensity = Number(document.getElementById('intensity').value)
      const notes = document.getElementById('notes').value.trim()
      const sleep = document.getElementById('sleep').value
      const gratitude = document.getElementById('gratitude').value.trim()

      if (!emotion) {
        setCheckinStatus('Please enter an emotion.')
        return
      }

      if (!intensity || intensity < 1 || intensity > 10) {
        setCheckinStatus('Intensity must be between 1 and 10.')
        return
      }

      setCheckinStatus('Saving check-in...')

      const { error } = await supabase
        .from('checkins')
        .insert([
          {
            user_id: authData.user.id,
            emotion,
            intensity,
            notes,
            sleep_hours: sleep ? Number(sleep) : null,
            gratitude
          }
        ])

      if (error) {
        setCheckinStatus(`Save failed: ${error.message}`)
        return
      }

      setCheckinStatus('Check-in saved successfully.')
      await loadCheckins()
    }

    async function loadCheckins() {
      const { data: authData, error: authError } = await supabase.auth.getUser()

      if (authError || !authData.user) {
        history.innerHTML = 'Log in to view your check-ins.'
        return
      }

      const { data, error } = await supabase
        .from('checkins')
        .select('*')
        .eq('user_id', authData.user.id)
        .order('created_at', { ascending: false })
        .limit(10)

      if (error) {
        history.innerHTML = `Could not load check-ins: ${error.message}`
        return
      }

      if (!data || data.length === 0) {
        history.innerHTML = 'No check-ins yet.'
        return
      }

      history.innerHTML = data.map(item => `
        <div class="history-item">
          <div><strong>${item.emotion}</strong> — intensity ${item.intensity}/10</div>
          <div>${item.notes || 'No notes added.'}</div>
          <div class="small">Sleep: ${item.sleep_hours ?? 'N/A'} | Gratitude: ${item.gratitude || 'N/A'}</div>
          <div class="small">${new Date(item.created_at).toLocaleString()}</div>
        </div>
      `).join('')
    }

    async function checkSession() {
      const { data, error } = await supabase.auth.getUser()

      if (error || !data.user) {
        setAuthStatus('Not logged in')
        return
      }

      setAuthStatus(`Logged in as ${data.user.email}`)
      await ensureProfile(data.user)
      await loadCheckins()
    }

    document.getElementById('signupBtn').addEventListener('click', signUp)
    document.getElementById('loginBtn').addEventListener('click', login)
    document.getElementById('logoutBtn').addEventListener('click', logout)
    document.getElementById('saveCheckinBtn').addEventListener('click', saveCheckin)
    document.getElementById('loadCheckinsBtn').addEventListener('click', loadCheckins)

    checkSession()
  </script>
</body>
</html>
